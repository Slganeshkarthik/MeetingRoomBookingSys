<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Forgot Password – {{ config.app_title if config else 'Meeting Hall System' }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4f7fb;--text:#0f172a;--muted:#64748b;--line:#dbe4ee;--navy:#0f2748;--navy-2:#17375f;--shadow:0 18px 50px rgba(15,23,42,.08);--success:#16a34a;--error:#9f1239}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left,rgba(29,78,216,.08),transparent 28%),radial-gradient(circle at bottom right,rgba(15,39,72,.06),transparent 22%),var(--bg);color:var(--text)}

    .card{background:#fff;border:1px solid rgba(219,228,238,.9);border-radius:28px;box-shadow:var(--shadow);padding:44px 40px;width:100%;max-width:480px;text-align:center;animation:fadeUp .4s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .icon-wrap{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;display:grid;place-items:center;font-size:30px;margin:0 auto 20px;box-shadow:0 10px 28px rgba(15,39,72,.2)}
    h2{font-size:26px;font-weight:900;letter-spacing:-.03em;margin-bottom:8px}
    .subtitle{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:24px}
    .subtitle strong{color:var(--text)}

    /* Step indicators */
    .steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:28px}
    .step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--line);background:#f8fafc;color:var(--muted);font-size:13px;font-weight:700;display:grid;place-items:center;transition:.25s ease;position:relative;z-index:1}
    .step-dot.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 4px 12px rgba(15,39,72,.25)}
    .step-dot.done{background:var(--success);border-color:var(--success);color:#fff}
    .step-line{flex:1;height:2px;background:var(--line);margin:0 6px;transition:.25s ease;max-width:60px}
    .step-line.done{background:var(--success)}

    .alert{border-radius:14px;padding:12px 14px;margin-bottom:16px;font-size:13px;line-height:1.5;text-align:left}
    .alert-error{background:#fff1f2;color:var(--error);border:1px solid #fecdd3}
    .alert-success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}

    .field{text-align:left;margin-bottom:16px}
    label{display:block;font-size:13px;font-weight:700;color:#334155;margin-bottom:7px}
    input[type="text"],input[type="password"]{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font:inherit;font-size:14px;background:#fff;color:var(--text);outline:none;transition:.18s ease}
    input.otp-input{font-size:20px;letter-spacing:.4em;text-align:center;padding:14px}
    input:focus{border-color:rgba(29,78,216,.45);box-shadow:0 0 0 4px rgba(29,78,216,.1)}

    .password-wrap{position:relative}
    .password-wrap input{padding-right:44px}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0;line-height:1}
    .toggle-pw:hover{color:var(--navy)}

    .btn-primary{width:100%;border:none;border-radius:14px;padding:14px;font:inherit;font-weight:800;font-size:15px;cursor:pointer;background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;box-shadow:0 14px 28px rgba(15,39,72,.2);transition:transform .18s,box-shadow .18s,opacity .18s;margin-top:4px}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 18px 36px rgba(15,39,72,.25)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-secondary{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit;font-weight:700;font-size:13px;cursor:pointer;background:#f8fafc;color:var(--navy);transition:.18s;margin-top:10px}
    .btn-secondary:hover{background:#eef4ff}
    .btn-secondary:disabled{opacity:.5;cursor:not-allowed}

    .helper{font-size:12px;color:var(--muted);margin-top:6px}
    .links{margin-top:20px;font-size:13px;color:var(--muted)}
    .links a{color:var(--navy);font-weight:800;text-decoration:none}
    .links a:hover{text-decoration:underline}

    .pw-strength{margin-top:8px;display:flex;gap:4px}
    .pw-strength-bar{flex:1;height:4px;border-radius:2px;background:var(--line);transition:.2s}
    .pw-strength-label{font-size:11px;color:var(--muted);margin-top:4px;text-align:right}

    /* Panel transitions */
    .panel{display:none}
    .panel.active{display:block;animation:fadeUp .3s ease}

    @media(max-width:520px){.card{padding:32px 22px;border-radius:22px}}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap" id="cardIcon">🔑</div>
    <h2 id="cardTitle">Forgot Password</h2>
    <p class="subtitle" id="cardSubtitle">Enter your username and we'll send a reset code to your registered email.</p>

    <!-- Step indicators -->
    <div class="steps">
      <div class="step-dot active" id="step1Dot">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="step2Dot">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="step3Dot">3</div>
    </div>

    <!-- Alert box -->
    <div class="alert alert-error" id="alertBox" style="display:none"></div>

    <!-- ── STEP 1: Enter username ── -->
    <div class="panel active" id="panel1">
      <div class="field">
        <label for="usernameInput">Username</label>
        <input type="text" id="usernameInput" placeholder="Enter your username" autocomplete="username">
      </div>
      <button class="btn-primary" id="sendOtpBtn" onclick="sendOtp()">Send Reset Code</button>
    </div>

    <!-- ── STEP 2: Enter OTP ── -->
    <div class="panel" id="panel2">
      <div class="field">
        <label for="otpInput">6-digit Reset Code</label>
        <input type="text" class="otp-input" id="otpInput" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" placeholder="••••••" autocomplete="one-time-code">
        <p class="helper">Code expires in <strong>5 minutes</strong>. Check your registered email.</p>
      </div>
      <button class="btn-primary" id="verifyOtpBtn" onclick="verifyOtp()">Verify Code</button>
      <button class="btn-secondary" id="resendBtn" disabled onclick="resendOtp()">↻ Resend in <span id="countdown">60</span>s</button>
    </div>

    <!-- ── STEP 3: New password ── -->
    <div class="panel" id="panel3">
      <div class="field">
        <label for="newPwInput">New Password</label>
        <div class="password-wrap">
          <input type="password" id="newPwInput" placeholder="Min. 6 characters" autocomplete="new-password" oninput="updateStrength()">
          <button type="button" class="toggle-pw" onclick="togglePw('newPwInput',this)" title="Toggle visibility">👁</button>
        </div>
        <div class="pw-strength">
          <div class="pw-strength-bar" id="bar1"></div>
          <div class="pw-strength-bar" id="bar2"></div>
          <div class="pw-strength-bar" id="bar3"></div>
          <div class="pw-strength-bar" id="bar4"></div>
        </div>
        <p class="pw-strength-label" id="strengthLabel"></p>
      </div>
      <div class="field">
        <label for="confirmPwInput">Confirm New Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPwInput" placeholder="Re-enter password" autocomplete="new-password">
          <button type="button" class="toggle-pw" onclick="togglePw('confirmPwInput',this)" title="Toggle visibility">👁</button>
        </div>
      </div>
      <button class="btn-primary" id="resetBtn" onclick="resetPassword()">Reset Password</button>
    </div>

    <div class="links">
      <a href="/login.html">← Back to Login</a>
    </div>
  </div>

<script>
const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
let currentStep = 1;
let resendTimer = null;
let resendSeconds = 60;

// ── Helper: show alert ──
function showAlert(msg, type = 'error') {
  const box = document.getElementById('alertBox');
  box.className = 'alert alert-' + type;
  box.textContent = msg;
  box.style.display = 'block';
}
function hideAlert() {
  document.getElementById('alertBox').style.display = 'none';
}

// ── Step navigation ──
function goToStep(n) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + n).classList.add('active');
  currentStep = n;

  const titles = ['', 'Forgot Password', 'Enter Reset Code', 'New Password'];
  const subs   = ['',
    'Enter your username and we\'ll send a reset code to your registered email.',
    'Enter the 6-digit code sent to your registered email address.',
    'Choose a strong new password for your account.'
  ];
  const icons  = ['', '🔑', '📨', '🔒'];
  document.getElementById('cardTitle').textContent = titles[n];
  document.getElementById('cardSubtitle').textContent = subs[n];
  document.getElementById('cardIcon').textContent = icons[n];
  hideAlert();

  // Update step dots
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById('step' + i + 'Dot');
    dot.classList.remove('active', 'done');
    if (i < n) dot.classList.add('done'), dot.textContent = '✓';
    else if (i === n) dot.classList.add('active'), dot.textContent = i;
    else dot.textContent = i;
  }
  // Update connector lines
  document.getElementById('line1').classList.toggle('done', n > 1);
  document.getElementById('line2').classList.toggle('done', n > 2);
}

// ── STEP 1: Request OTP ──
async function sendOtp() {
  const username = document.getElementById('usernameInput').value.trim();
  if (!username) { showAlert('Please enter your username.'); return; }

  const btn = document.getElementById('sendOtpBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  hideAlert();

  try {
    const res = await fetch('/api/forgot-password/request-otp', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRFToken': csrfToken},
      credentials: 'same-origin',
      body: JSON.stringify({ username })
    });
    const data = await res.json();
    if (data.ok) {
      goToStep(2);
      startResendTimer();
    } else {
      showAlert(data.message || 'Failed to send reset code.');
    }
  } catch(e) {
    showAlert('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Reset Code';
  }
}

// ── STEP 2: Verify OTP ──
async function verifyOtp() {
  const otp = document.getElementById('otpInput').value.trim();
  if (!otp || otp.length !== 6) { showAlert('Enter the 6-digit code.'); return; }

  const btn = document.getElementById('verifyOtpBtn');
  btn.disabled = true;
  btn.textContent = 'Verifying…';
  hideAlert();

  try {
    const res = await fetch('/api/forgot-password/verify-otp', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRFToken': csrfToken},
      credentials: 'same-origin',
      body: JSON.stringify({ otp })
    });
    const data = await res.json();
    if (data.ok) {
      clearResendTimer();
      goToStep(3);
    } else {
      showAlert(data.message || 'Invalid or expired code.');
    }
  } catch(e) {
    showAlert('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Verify Code';
  }
}

// ── STEP 2: Resend OTP ──
async function resendOtp() {
  const btn = document.getElementById('resendBtn');
  btn.disabled = true;
  hideAlert();

  try {
    const res = await fetch('/api/forgot-password/request-otp', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRFToken': csrfToken},
      credentials: 'same-origin',
      body: JSON.stringify({ resend: true })
    });
    const data = await res.json();
    if (data.ok) {
      showAlert('A new code has been sent to your email.', 'success');
      resendSeconds = 60;
      startResendTimer();
    } else {
      showAlert(data.message || 'Failed to resend code.');
    }
  } catch(e) {
    showAlert('Network error. Please try again.');
  }
}

function startResendTimer() {
  clearResendTimer();
  const btn = document.getElementById('resendBtn');
  const span = document.getElementById('countdown');
  resendSeconds = 60;
  btn.disabled = true;
  function tick() {
    if (resendSeconds <= 0) {
      btn.disabled = false;
      btn.textContent = '↻ Resend Code';
      return;
    }
    span.textContent = resendSeconds;
    btn.innerHTML = '↻ Resend in <span id="countdown">' + resendSeconds + '</span>s';
    resendSeconds--;
    resendTimer = setTimeout(tick, 1000);
  }
  tick();
}
function clearResendTimer() {
  if (resendTimer) { clearTimeout(resendTimer); resendTimer = null; }
}

// ── STEP 3: Reset password ──
async function resetPassword() {
  const pw  = document.getElementById('newPwInput').value;
  const cpw = document.getElementById('confirmPwInput').value;

  if (!pw || pw.length < 6) { showAlert('Password must be at least 6 characters.'); return; }
  if (pw !== cpw) { showAlert('Passwords do not match.'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.textContent = 'Resetting…';
  hideAlert();

  try {
    const res = await fetch('/api/forgot-password/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRFToken': csrfToken},
      credentials: 'same-origin',
      body: JSON.stringify({ new_password: pw })
    });
    const data = await res.json();
    if (data.ok) {
      showAlert('Password reset successfully! Redirecting to login…', 'success');
      setTimeout(() => { window.location.href = '/login.html'; }, 2200);
    } else {
      showAlert(data.message || 'Password reset failed.');
    }
  } catch(e) {
    showAlert('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}

// ── Password strength indicator ──
function updateStrength() {
  const pw = document.getElementById('newPwInput').value;
  const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
  const label = document.getElementById('strengthLabel');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw) || /[0-9]/.test(pw)) score++;
  const colors = ['#ef4444','#f97316','#eab308','#16a34a'];
  const labels = ['','Weak','Fair','Good','Strong'];
  bars.forEach((b, i) => {
    b.style.background = i < score ? colors[score - 1] : 'var(--line)';
  });
  label.textContent = labels[score] || '';
  label.style.color = score > 0 ? colors[score - 1] : 'var(--muted)';
}

// ── Toggle password visibility ──
function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? '🙈' : '👁';
}

// ── Keyboard: Enter key support ──
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (currentStep === 1) sendOtp();
  else if (currentStep === 2) verifyOtp();
  else if (currentStep === 3) resetPassword();
});
</script>
</body>
</html>
